# ===================================================================
# [System] KIE(Key Information Extraction) Configuration
# ===================================================================

spring.application.name=kie

# [Server] 서버 종료 시 진행 중인 요청을 안전하게 마무리
server.shutdown=graceful
# 종료 시 대기 시간 (최대 30초)
spring.lifecycle.timeout-per-shutdown-phase=30s

# [Server] 파일 업로드 용량 제한 (대용량 이미지/PDF 대응)
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# [Remote] 외부 KIE 서버 연동 주소
kie.remote.api-url=http://localhost:8000/api/v1/kie/extract
